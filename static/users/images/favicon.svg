<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#025d30"/>
      <stop offset="100%" style="stop-color:#038a47"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38ef7d"/>
      <stop offset="100%" style="stop-color:#a8f5c8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Stylized D shape (book spine = left bar, curved pages = arc) -->
  <!-- Left vertical bar -->
  <rect x="14" y="13" width="7" height="38" rx="3" fill="white"/>
  <!-- D curve arc -->
  <path d="M20 13 Q46 13 46 32 Q46 51 20 51" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Inner cutout to make D hollow look clean -->
  <path d="M20 20 Q38 20 38 32 Q38 44 20 44" stroke="url(#bg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Accent spark dot top-right -->
  <circle cx="50" cy="14" r="5" fill="url(#spark)"/>
</svg>
